# ============================================================
# IgirePay Idempotency Gateway — Application Configuration
# ============================================================

server.port=8080

# Application name (shown in Actuator /info)
spring.application.name=idempotency-gateway

# ── Idempotency Store ────────────────────────────────────────
# How long (in hours) to keep idempotency records before eviction
idempotency.ttl-hours=24

# How often (in ms) to run the cleanup job (default: every hour)
idempotency.cleanup-interval-ms=3600000

# ── Actuator ────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ─────────────────────────────────────────────────
logging.level.com.igirepay=INFO
