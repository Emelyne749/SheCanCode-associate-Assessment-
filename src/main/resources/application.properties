server.port=8080
spring.application.name=idempotency-gateway

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/idempotency_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Mami@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Idempotency TTL
idempotency.ttl-hours=24
idempotency.cleanup-interval-ms=3600000

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.igirepay=INFO
logging.level.org.hibernate.SQL=DEBUG